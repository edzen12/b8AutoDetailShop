<!--blog area start-->
<div class="blog_area">
    <div class="container">
        <div class="row">
            <div class="col-12">
                <div class="section_title title_style2">
                    <div class="title_content">
                        <h2><span>Latest</span>  Blog Posts</h2>
                        <p>The highest discount products of Mazlay </p>   
                    </div>                 
                </div>
                </div>
        </div>   
        <div class="row">
            <div class="blog_container blog_column4 owl-carousel">
                {% for post in posts %}
                <div class="col-lg-3">
                    <article class="single_blog">
                        <figure>
                            <div class="blog_thumb">
                                <a href="{% url "post_detail" post.slug %}">
                                    <img src="{{post.img.url}}" alt="">
                                </a>
                            </div>
                            <figcaption class="blog_content">
                                <h4><a href="{% url "post_detail" post.slug %}">{{post.title}}</a></h4> 
                                <div class="post_meta">
                                    <p>
                                        {% comment %} {% for tag in posts %}
                                            <a href="">{{tag.name}}</a>
                                        {% endfor %}  {% endcomment %}
                                        / {{post.created_at}}
                                    </p>
                                </div>
                                <div class="post_desc">
                                    <p>{{post.description|truncatewords:10|safe}}</p>
                                </div>
                                <footer class="post_readmore">
                                    <a href="{% url "post_detail" post.slug %}">Читать дальше</a>
                                </footer>
                            </figcaption>
                        </figure>
                    </article>
                </div>
                {% endfor %}
            </div>
        </div>          
    </div>
</div>
<!--blog area end-->
