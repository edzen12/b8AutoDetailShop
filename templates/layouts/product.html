{% load static %}
<!--product area start-->
<div class="product_area">
   <div class="container">
      <div class="row">
         <div class="col-12">
            <div class="section_title">
               <h2>
                  <span>our</span> Products
               </h2>
               <p>Gena</p>
            </div>
         </div>
      </div>
      <div class="tab-content">
         <div class="tab-pane fade show active" id="Sellers" role="tabpanel">
            <div class="row">
               <div class="product_carousel product_column5 owl-carousel"> 
                {% for product in products %} 
                <div class="col-lg-3">
                     <div class="product_items">
                        <article class="single_product">
                           <figure>
                              <div class="product_thumb"> 
                                {% if product.get_main_image %} 
                                <a class="primary_img" href="#">
                                    <img src="{{ product.get_main_image.image.url }}" alt="">
                                 </a> 
                                 {% endif %} 
                                 {% if product.get_second_image %} <a class="secondary_img" href="#">
                                    <img src="{{ product.get_second_image.image.url }}" alt="">
                                 </a> 
                                 {% endif %} 
                                 <div class="quick_button">
                                    <a href="index.html#" data-bs-toggle="modal" data-bs-target="#modal_box" title="quick view">
                                       <i class="icon-eye"></i>
                                    </a>
                                 </div>
                              </div>
                              <div class="product_content">
                                 <div class="product_content_inner">
                                    <p class="manufacture_product">
                                       <a href="" style="color:red">{{product.category}}</a>
                                    </p>
                                    <h4 class="product_name">
                                       <a href="product-details.html">{{product.name}}</a>
                                    </h4>
                                    <div class="product_rating">
                                       <ul>
                                          <li>
                                             <a href="#">
                                                <i class="ion-android-star-outline"></i>
                                             </a>
                                          </li>
                                          <li>
                                             <a href="#">
                                                <i class="ion-android-star-outline"></i>
                                             </a>
                                          </li>
                                          <li>
                                             <a href="#">
                                                <i class="ion-android-star-outline"></i>
                                             </a>
                                          </li>
                                          <li>
                                             <a href="#">
                                                <i class="ion-android-star-outline"></i>
                                             </a>
                                          </li>
                                          <li>
                                             <a href="#">
                                                <i class="ion-android-star-outline"></i>
                                             </a>
                                          </li>
                                       </ul>
                                    </div>
                                    <div class="price_box">
                                       <span class="current_price">{{product.price}} сом</span>
                                    </div>
                                 </div>
                                 <div class="action_links">
                                    <ul>
                                       <li class="add_to_cart">
                                          <form action="{% url 'add_to_cart' product.id %}" method='post'> 
                                            {% csrf_token %} 
                                            <button type="submit"> 
                                                Добавить в корзину 
                                            </button>
                                          </form>
                                       </li>
                                       <li class="wishlist">
                                          <form action='{% url "wishlist_toggle" product.id %}' method='post'>
                                             {% csrf_token %}
                                             <button type="submit">
                                                <i class="icon-heart"></i>
                                             </button>
                                          </form>
                                       </li>
                                    </ul>
                                 </div>
                              </div>
                           </figure>
                        </article>
                     </div>
                  </div> {% endfor %} </div>
            </div>
         </div>
      </div>
   </div>
</div>
<!--product area end-->
{% comment %} {% include "layouts/product2.html" %} {% endcomment %}
